name: build-images

# Сборка образов в CI и публикация в GHCR (§19: build вне prod, immutable tags).
# vds затем делает docker pull + up — без сборки.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'meridian-web/backend/**'
      - 'meridian-web/frontend/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "name=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api
        uses: docker/build-push-action@v6
        with:
          context: meridian-web/backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/meridian-api:latest
            ghcr.io/${{ steps.owner.outputs.name }}/meridian-api:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: meridian-web/frontend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/meridian-frontend:latest
            ghcr.io/${{ steps.owner.outputs.name }}/meridian-frontend:${{ github.sha }}
