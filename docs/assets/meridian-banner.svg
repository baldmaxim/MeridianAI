<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MERIDIAN — AI-ассистент для переговоров в строительстве">
  <!-- Background (self-contained dark — looks good on both GitHub themes) -->
  <rect x="1" y="1" width="998" height="258" rx="22" fill="#0B0E14"/>
  <rect x="1.5" y="1.5" width="997" height="257" rx="21.5" stroke="#1A2135" stroke-width="1"/>
  <!-- subtle amber glow corner -->
  <circle cx="130" cy="130" r="150" fill="#F5A623" opacity="0.04"/>

  <!-- Compass / crosshair mark, centered at (130,130) -->
  <g stroke-linecap="round">
    <circle cx="130" cy="130" r="90" stroke="#F5A623" stroke-width="1" opacity="0.12"/>
    <circle cx="130" cy="130" r="70" stroke="#F5A623" stroke-width="1" stroke-dasharray="4 8" opacity="0.28"/>
    <circle cx="130" cy="130" r="46" stroke="#F5A623" stroke-width="1.5" opacity="0.55"/>
    <circle cx="130" cy="130" r="24" stroke="#F5A623" stroke-width="2" opacity="0.85"/>
    <circle cx="130" cy="130" r="6.5" fill="#F5A623" stroke="none"/>
    <!-- Cardinal ticks -->
    <line x1="130" y1="22"  x2="130" y2="40"  stroke="#F5A623" stroke-width="2"/>
    <line x1="130" y1="220" x2="130" y2="238" stroke="#F5A623" stroke-width="2"/>
    <line x1="22"  y1="130" x2="40"  y2="130" stroke="#F5A623" stroke-width="2"/>
    <line x1="220" y1="130" x2="238" y2="130" stroke="#F5A623" stroke-width="2"/>
    <!-- Mid ticks -->
    <line x1="130" y1="96"  x2="130" y2="108" stroke="#F5A623" stroke-width="1.5" opacity="0.7"/>
    <line x1="130" y1="152" x2="130" y2="164" stroke="#F5A623" stroke-width="1.5" opacity="0.7"/>
    <line x1="96"  y1="130" x2="108" y2="130" stroke="#F5A623" stroke-width="1.5" opacity="0.7"/>
    <line x1="152" y1="130" x2="164" y2="130" stroke="#F5A623" stroke-width="1.5" opacity="0.7"/>
    <!-- Diagonal ticks at 45° -->
    <line x1="66"  y1="66"  x2="74"  y2="74"  stroke="#F5A623" stroke-width="1" opacity="0.4"/>
    <line x1="194" y1="66"  x2="186" y2="74"  stroke="#F5A623" stroke-width="1" opacity="0.4"/>
    <line x1="66"  y1="194" x2="74"  y2="186" stroke="#F5A623" stroke-width="1" opacity="0.4"/>
    <line x1="194" y1="194" x2="186" y2="186" stroke="#F5A623" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Divider -->
  <line x1="272" y1="74" x2="272" y2="186" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="302" y="118" font-family="Syne, 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="62" letter-spacing="9" fill="#EDF2FF">MERIDIAN</text>
  <!-- Amber accent rule -->
  <rect x="304" y="134" width="248" height="3" rx="1.5" fill="#F5A623"/>
  <!-- Mono subtitle -->
  <text x="306" y="168" font-family="'JetBrains Mono', Consolas, monospace" font-weight="400" font-size="15" letter-spacing="5" fill="#8896B3">AI · NEGOTIATION ASSISTANT</text>
  <!-- Tagline -->
  <text x="304" y="200" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="17" fill="#8896B3">Realtime-транскрипция + LLM-подсказки для переговоров в строительстве</text>
</svg>
