# Portal-scoped compose для Meridian (корп. стандарт §4, §19).
# На VPS живёт в /opt/portals/app. Деплой этого проекта НЕ трогает
# nginx, Keycloak и другие сервисы на хосте — §19, corp-no-neighbor-damage.
#
# Образы — ТОЛЬКО из registry с immutable-тегом (${TAG}). Никаких build: на VPS.
# Порты наружу не публикуются: ingress (TLS/80/443) — отдельный infra-nginx проект.
#
# Запуск только через deploy/deploy.sh (health-gated). Секреты — из meridian.env (§18).

name: meridian

services:
  api:
    image: ${REGISTRY}/meridian-api:${TAG}
    env_file: [./meridian.env]
    environment:
      # БД — только Yandex Managed PG; DATABASE_URL берётся из meridian.env
      DEV_MODE: "false"
    networks:
      internal: {}
      infra_web:
        aliases: [meridian-api]
    restart: unless-stopped
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health/ready').status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Worker для фоновых задач (фаза 4). БД из meridian.env (Yandex).
  worker:
    image: ${REGISTRY}/meridian-api:${TAG}
    env_file: [./meridian.env]
    environment:
      DEV_MODE: "false"
    command: ["python", "-m", "app.worker"]
    networks: [internal]
    restart: unless-stopped

  # Миграции — отдельный шаг (§8). DATABASE_URL (Yandex) из meridian.env.
  # Запускается deploy.sh: docker compose run --rm migrate
  migrate:
    image: ${REGISTRY}/meridian-api:${TAG}
    env_file: [./meridian.env]
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks: [internal]
    profiles: ["tools"]

  # БД — только Yandex Managed PostgreSQL. Локального postgres-контейнера и
  # backup-сервиса нет: бэкапы делает Yandex. §26.

  frontend:
    image: ${REGISTRY}/meridian-frontend:${TAG}
    networks:
      infra_web:
        aliases: [meridian-frontend]
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  # Внешняя сеть, общая с infra-nginx. Создаётся один раз:
  #   docker network create infra_web
  infra_web:
    external: true
