# Edge-nginx портала Meridian (single-host вариант): публикуется на 127.0.0.1:8080,
# host-nginx сайт `meridian` проксирует сюда без изменений. Без TLS (TLS на host-nginx).
#
# Docker-resolver + переменные в proxy_pass → nginx ПЕРЕРАЗРЕШАЕТ api/frontend по DNS
# (per-request, TTL 10s). Поэтому пересоздание api/frontend (новый IP) НЕ роняет edge.

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    client_max_body_size 50M;

    # встроенный DNS Docker
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        location /api/ {
            set $up_api api:8000;
            proxy_pass http://$up_api$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        location /health/ {
            set $up_api api:8000;
            proxy_pass http://$up_api$request_uri;
            proxy_set_header Host $host;
        }

        location /ws/ {
            set $up_api api:8000;
            proxy_pass http://$up_api$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            set $up_front frontend:80;
            proxy_pass http://$up_front$request_uri;
            proxy_set_header Host $host;
        }
    }
}
