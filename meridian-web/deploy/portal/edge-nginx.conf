# Edge-nginx портала Meridian (вариант FVDS): публикуется на 127.0.0.1:8080,
# host-nginx сайт `meridian` проксирует сюда без изменений.
# Без TLS — TLS терминирует host-nginx на :443.

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    client_max_body_size 50M;

    upstream meridian_api      { server api:8000; }
    upstream meridian_frontend { server frontend:80; }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://meridian_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        }

        # health для health-gate деплоя/uptime
        location /health/ {
            proxy_pass http://meridian_api;
            proxy_set_header Host $host;
        }

        location /ws/ {
            proxy_pass http://meridian_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://meridian_frontend;
            proxy_set_header Host $host;
        }
    }
}
