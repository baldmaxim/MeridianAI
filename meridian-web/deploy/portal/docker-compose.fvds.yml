# FVDS-вариант portal-compose: сборка образов НА СЕРВЕРЕ (нет registry — отступление от §19,
# зафиксировано в CLAUDE.md). Edge-nginx публикуется на 127.0.0.1:8080 — host-nginx сайт
# `meridian` проксирует сюда без изменений. postgres наружу НЕ публикуется.
#
# Запуск (из корня клона репо, /opt/portals/meridian):
#   docker compose -p meridian -f meridian-web/deploy/portal/docker-compose.fvds.yml build
#   docker compose -p meridian -f ... up -d postgres
#   docker compose -p meridian -f ... run --rm migrate
#   docker compose -p meridian -f ... up -d api frontend edge

name: meridian

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: meridian
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../../backend/db/init:/docker-entrypoint-initdb.d:ro
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meridian -d meridian"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://meridian_migration:${MIGRATION_DB_PASSWORD}@postgres:5432/meridian
      MIGRATION_DATABASE_URL: postgresql+asyncpg://meridian_migration:${MIGRATION_DB_PASSWORD}@postgres:5432/meridian
    command: ["python", "-m", "alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    profiles: ["tools"]

  api:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://meridian_runtime:${RUNTIME_DB_PASSWORD}@postgres:5432/meridian
      DEV_MODE: "false"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  worker:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    environment:
      DATABASE_URL: postgresql+asyncpg://meridian_runtime:${RUNTIME_DB_PASSWORD}@postgres:5432/meridian
      DEV_MODE: "false"
    command: ["python", "-m", "app.worker"]
    depends_on:
      postgres:
        condition: service_healthy
    networks: [internal]
    restart: unless-stopped

  frontend:
    build: ../../frontend
    image: ${FRONTEND_IMAGE:-meridian-frontend:local}
    networks: [internal]
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    volumes:
      - ./edge-nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    depends_on: [api, frontend]
    networks: [internal]
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pg_data:
