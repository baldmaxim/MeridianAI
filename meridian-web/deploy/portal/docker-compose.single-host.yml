# Single-host вариант portal-compose: сборка образов НА СЕРВЕРЕ (нет registry — отступление от §19,
# зафиксировано в CLAUDE.md). Edge-nginx публикуется на 127.0.0.1:8080 — host-nginx сайт
# `meridian` проксирует сюда без изменений.
#
# БД: только Yandex Managed PostgreSQL. Локального postgres-контейнера НЕТ —
# DATABASE_URL берётся из meridian.env (единый источник правды, §18).
#
# Запуск (из корня клона репо, /opt/portals/app):
#   docker compose -p meridian -f meridian-web/deploy/portal/docker-compose.single-host.yml build
#   docker compose -p meridian -f ... run --rm migrate
#   docker compose -p meridian -f ... up -d api worker frontend edge

name: meridian

services:
  migrate:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks: [internal]
    profiles: ["tools"]

  api:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    environment:
      DEV_MODE: "false"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]
    restart: unless-stopped

  worker:
    build: ../../backend
    image: ${API_IMAGE:-meridian-api:local}
    env_file: [./meridian.env]
    environment:
      DEV_MODE: "false"
    command: ["python", "-m", "app.worker"]
    networks: [internal]
    restart: unless-stopped

  frontend:
    build: ../../frontend
    image: ${FRONTEND_IMAGE:-meridian-frontend:local}
    networks: [internal]
    restart: unless-stopped

  edge:
    image: nginx:1.27-alpine
    volumes:
      - ./edge-nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    depends_on: [api, frontend]
    networks: [internal]
    restart: unless-stopped

networks:
  internal:
    driver: bridge
