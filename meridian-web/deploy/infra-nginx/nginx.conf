events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Реальный IP клиента из X-Forwarded (§3)
    log_format main '$remote_addr - $request_method $uri $status ${request_time}s';
    access_log /var/log/nginx/access.log main;

    # Rate-limit зоны (§3) — применяются в conf.d/meridian.conf
    limit_req_zone $binary_remote_addr zone=meridian_api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=meridian_auth:10m rate=2r/s;

    sendfile on;
    keepalive_timeout 65;

    include /etc/nginx/conf.d/*.conf;
}
