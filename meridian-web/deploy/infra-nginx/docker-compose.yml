# Инфраструктурный ingress (nginx + certbot) — корп. стандарт §3, §23.
# На VPS живёт в /opt/infra/nginx, обновляется ОТДЕЛЬНО от порталов (§19).
#
# ВНИМАНИЕ: если на :443 уже есть nginx, фронтящий другие сервисы на хосте,
# НЕ поднимай этот проект — вместо этого внеси conf.d/meridian.conf в существующий
# nginx и подключи его к сети infra_web. Подробности — deploy/README.md.
#
# Сеть infra_web общая с порталами:  docker network create infra_web

name: infra-nginx

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    networks: [infra_web]
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

networks:
  infra_web:
    external: true
