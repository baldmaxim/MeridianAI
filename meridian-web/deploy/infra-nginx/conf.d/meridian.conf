# Маршрутизация meridian.fvds.ru → контейнеры портала по сети infra_web.
# upstream-имена = сетевые алиасы из deploy/portal/docker-compose.yml.

upstream meridian_api      { server meridian-api:8000; }
upstream meridian_frontend { server meridian-frontend:80; }

# HTTP: ACME challenge + redirect → HTTPS (§23)
server {
    listen 80;
    server_name meridian.fvds.ru;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl;
    server_name meridian.fvds.ru;

    ssl_certificate     /etc/letsencrypt/live/meridian.fvds.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meridian.fvds.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers на уровне ingress (§23). App добавляет X-Content-Type-Options и пр.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (SPA)
    location / {
        proxy_pass http://meridian_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API
    location /api/ {
        limit_req zone=meridian_api burst=40 nodelay;
        proxy_pass http://meridian_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;   # обычные запросы; крупные файлы — presigned S3 (фаза 5)
        proxy_read_timeout 120s;
    }

    # Жёсткий лимит на auth (anti-bruteforce, §21)
    location /api/auth/ {
        limit_req zone=meridian_auth burst=5 nodelay;
        proxy_pass http://meridian_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health (для uptime-проверок, §20)
    location = /health/live  { proxy_pass http://meridian_api; }
    location = /health/ready { proxy_pass http://meridian_api; }

    # WebSocket
    location /ws/ {
        proxy_pass http://meridian_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
