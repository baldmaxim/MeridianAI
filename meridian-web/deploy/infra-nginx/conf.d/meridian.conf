# Маршрутизация app.example.com → контейнеры портала по сети infra_web.
# Docker-resolver + переменные в proxy_pass → nginx ПЕРЕРАЗРЕШАЕТ api/frontend по DNS
# (TTL 10s). Поэтому пересоздание контейнеров портала (новый IP при deploy) НЕ роняет
# ingress и НЕ требует reload. Алиасы = сетевые имена из deploy/portal/docker-compose.yml.

# встроенный DNS Docker (резолвит алиасы контейнеров на сети infra_web)
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP: ACME challenge + redirect → HTTPS (§23)
server {
    listen 80;
    server_name app.example.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl;
    server_name app.example.com;

    ssl_certificate     /etc/letsencrypt/live/app.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers на уровне ingress (§23). App добавляет остальные.
    add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend (SPA)
    location / {
        set $up_front meridian-frontend:80;
        proxy_pass http://$up_front$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API
    location /api/ {
        limit_req zone=meridian_api burst=40 nodelay;
        set $up_api meridian-api:8000;
        proxy_pass http://$up_api$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 25M;   # обычные запросы; крупные файлы — presigned S3
        proxy_read_timeout 120s;
    }

    # Жёсткий лимит на auth (anti-bruteforce, §21)
    location /api/auth/ {
        limit_req zone=meridian_auth burst=5 nodelay;
        set $up_auth meridian-api:8000;
        proxy_pass http://$up_auth$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health (для uptime-проверок, §20)
    location = /health/live  { set $up_hl meridian-api:8000; proxy_pass http://$up_hl$request_uri; proxy_set_header Host $host; }
    location = /health/ready { set $up_hr meridian-api:8000; proxy_pass http://$up_hr$request_uri; proxy_set_header Host $host; }

    # WebSocket
    location /ws/ {
        set $up_ws meridian-api:8000;
        proxy_pass http://$up_ws$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
