server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # HTML-входная точка и манифест версии всегда ревалидируются,
    # чтобы редеплой подхватывался сразу.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /version.json {
        add_header Cache-Control "no-cache";
        default_type application/json;
    }

    # Контент-хэшированные ассеты иммутабельны — кэшируем надолго.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
